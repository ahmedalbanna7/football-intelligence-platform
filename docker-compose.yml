services:

  backend:
    build:
      context: ./apps/backend
    ports:
      - "8000:8000"
    env_file:
      - ./apps/backend/.env
    volumes:
      - ./apps/backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started

  migrate:
    build:
      context: ./apps/backend
    command: python -m app.db.migrate
    env_file:
      - ./apps/backend/.env
    volumes:
      - ./apps/backend:/app
    depends_on:
      - postgres

  video-worker:
    build:
      context: ./apps/backend
    command: python -m app.workers.video_worker
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env
    volumes:
      - ./apps/backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
