services:

  frontend:
    build:
      context: ./apps/frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ./apps/backend
    ports:
      - "8000:8000"
    env_file:
      - ./apps/backend/.env
    environment:
      YOLO_CONFIG_DIR: /tmp
    volumes:
      - ./apps/backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started

  migrate:
    build:
      context: ./apps/backend
    command: python -m app.db.migrate
    env_file:
      - ./apps/backend/.env
    volumes:
      - ./apps/backend:/app
    depends_on:
      - postgres

  video-worker:
    profiles:
      - worker
    build:
      context: ./apps/backend
    command: python -m app.workers.video_worker
    restart: unless-stopped
    cpus: "2.0"
    mem_limit: 2g
    env_file:
      - ./apps/backend/.env
    environment:
      YOLO_CONFIG_DIR: /tmp
    volumes:
      - ./apps/backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started

  match-analysis-worker:
    image: sports-platform-backend
    command: python -m app.workers.match_analysis_worker
    restart: unless-stopped
    cpus: "2.0"
    mem_limit: 2g
    env_file:
      - ./apps/backend/.env
    environment:
      YOLO_CONFIG_DIR: /tmp
      PYTHONPATH: /app:/opt/sports-main
    volumes:
      - ./apps/backend:/app
      - ./apps/match-analysis-worker/sports-main:/opt/sports-main:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
